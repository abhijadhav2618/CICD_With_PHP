name : Deploy PHP App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

    - name: checkout code
      uses: actions/checkout@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{secrets.AWS_REGION}}

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region ${{secrets.AWS_REGION}} \
        | docker login --username AWS \
        --password-stdin 731176811050.dkr.ecr.${{secrets.AWS_REGION}}.amazonaws.com   

    - name: Build Docker Image
      run: |
        docker build -t php-cicd .

    - name: Tag Image
      run: |
        docker tag php-cicd:latest 731176811050.dkr.ecr.us-east-1.amazonaws.com/php-cicd:latest 

    - name: Push image to ECR
      run : |
        docker push 731176811050.dkr.ecr.us-east-1.amazonaws.com/php-cicd:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{secrets.EC2_HOST}}
        username: ${{secrets.EC2_USER}}
        key: ${{secrets.EC2_SSH_KEY}}
        script: |
          docker stop php-container || true
          docker rm php-container || true
          docker pull 731176811050.dkr.ecr.us-east-1.amazonaws.com/php-cicd:latest
          docker run -d -p 80:80 --name php-container 731176811050.dkr.ecr.us-east-1.amazonaws.com/php-cicd:latest