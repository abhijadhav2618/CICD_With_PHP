name: Deploy PHP App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Checkout your code
    - name: Checkout code
      uses: actions/checkout@v3

    # Step 2: Configure AWS credentials on GitHub runner (needed for ECR push)
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # Step 3: Login to ECR on GitHub runner
    - name: Login to ECR
      run: |
        aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
        | docker login --username AWS \
        --password-stdin 731176811050.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

    # Step 4: Build Docker image locally on GitHub runner
    - name: Build Docker Image
      run: |
        docker build -t php-cicd .

    # Step 5: Tag Docker image
    - name: Tag Image
      run: |
        docker tag php-cicd:latest 731176811050.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/php-cicd:latest

    # Step 6: Push image to ECR
    - name: Push image to ECR
      run: |
        docker push 731176811050.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/php-cicd:latest

    # Step 7: SSH to EC2 and deploy container
    - name: Deploy to EC2
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # Login to ECR on EC2 (uses IAM role attached to EC2)
          aws ecr get-login-password --region us-east-1 \
          | docker login --username AWS --password-stdin 731176811050.dkr.ecr.us-east-1.amazonaws.com

          # Stop and remove old container if it exists
          docker stop php-container || true
          docker rm php-container || true

          # Pull latest image from ECR
          docker pull 731176811050.dkr.ecr.us-east-1.amazonaws.com/php-cicd:latest

          # Run new containerr
          docker run -d -p 80:80 --name php-container 731176811050.dkr.ecr.us-east-1.amazonaws.com/php-cicd:latest